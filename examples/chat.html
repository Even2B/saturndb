<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SaturnDB Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, sans-serif;
    background: #0f0f0f;
    color: #f0f0f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #app {
    width: 420px;
    height: 600px;
    background: #1a1a1a;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  #header {
    padding: 16px 20px;
    background: #111;
    font-weight: 600;
    font-size: 15px;
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #22c55e;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 2px;
    max-width: 80%;
  }

  .msg.mine { align-self: flex-end; align-items: flex-end; }
  .msg.theirs { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 8px 12px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.4;
  }

  .mine .bubble   { background: #6366f1; color: #fff; border-bottom-right-radius: 4px; }
  .theirs .bubble { background: #2a2a2a; color: #f0f0f0; border-bottom-left-radius: 4px; }

  .meta { font-size: 11px; color: #555; padding: 0 4px; }

  #footer {
    padding: 12px;
    border-top: 1px solid #2a2a2a;
    display: flex;
    gap: 8px;
  }

  #input {
    flex: 1;
    background: #2a2a2a;
    border: none;
    border-radius: 8px;
    padding: 10px 14px;
    color: #f0f0f0;
    font-size: 14px;
    outline: none;
  }

  #input::placeholder { color: #555; }

  #send {
    background: #6366f1;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    font-weight: 500;
  }

  #send:hover { background: #4f52d4; }

  #login {
    width: 420px;
    background: #1a1a1a;
    border-radius: 12px;
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  #login h2 { font-size: 20px; margin-bottom: 4px; }
  #login p  { font-size: 13px; color: #666; margin-bottom: 8px; }

  #login input {
    background: #2a2a2a;
    border: none;
    border-radius: 8px;
    padding: 12px 14px;
    color: #f0f0f0;
    font-size: 14px;
    outline: none;
  }

  #login button {
    background: #6366f1;
    border: none;
    border-radius: 8px;
    padding: 12px;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    font-weight: 500;
  }

  #login button:hover { background: #4f52d4; }
</style>
</head>
<body>

<div id="login">
  <h2>SaturnDB Chat</h2>
  <p>powered by SaturnDB DB — realtime, no backend</p>
  <input id="username" placeholder="your name" maxlength="20" />
  <button onclick="join()">join</button>
</div>

<div id="app" style="display:none">
  <div id="header">
    <div id="dot"></div>
    <span id="room-name">chat</span>
  </div>
  <div id="messages"></div>
  <div id="footer">
    <input id="input" placeholder="message..." />
    <button id="send" onclick="send()">send</button>
  </div>
</div>

<script>
const HOST  = "127.0.0.1";
const PORT  = 7379;
const TOKEN = "saturn-admin-secret";

let ws;
let username;
let buffer = "";

function join() {
  username = document.getElementById("username").value.trim();
  if (!username) return;

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display   = "flex";
  document.getElementById("room-name").textContent = `chat — ${username}`;

  connect();
}

function connect() {
  // SaturnDB speaks raw TCP — use a WebSocket proxy on port 7380
  ws = new WebSocket(`ws://${HOST}:7380`);

  ws.onopen = () => {
    sendLine(`AUTH ${TOKEN}`);
    sendLine("WATCH chat:*");
  };

  ws.onmessage = (e) => {
    buffer += e.data;
    const lines = buffer.split("\n");
    buffer = lines.pop();
    for (const line of lines) {
      if (line.startsWith("EVENT ")) handleEvent(line);
    }
  };

  ws.onclose = () => setTimeout(connect, 1000);
}

function sendLine(line) {
  ws.send(line + "\n");
}

function handleEvent(line) {
  const rest    = line.slice(6);
  const spaceAt = rest.indexOf(" ");
  const payload = JSON.parse(rest.slice(spaceAt + 1));
  appendMessage(payload.user, payload.message, payload.user === username);
}

function appendMessage(user, text, mine) {
  const msgs = document.getElementById("messages");
  const div  = document.createElement("div");
  div.className = `msg ${mine ? "mine" : "theirs"}`;
  div.innerHTML = `
    <div class="meta">${mine ? "you" : user}</div>
    <div class="bubble">${escapeHtml(text)}</div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function send() {
  const input = document.getElementById("input");
  const text  = input.value.trim();
  if (!text) return;
  input.value = "";

  const key     = `chat:${Date.now()}`;
  const payload = JSON.stringify({ user: username, message: text });
  sendLine(`EMIT ${key} ${payload}`);
}

document.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});

function escapeHtml(t) {
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
</script>
</body>
</html>
